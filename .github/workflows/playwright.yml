name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev]
    container:
      image: ghcr.io/danielsilva-loanpro/sdet-interview-challenge:latest
    steps:
    - name: Checkout your repository code
      uses: actions/checkout@v4

    - name: Create .env file
      env:
        BASE_URL: ${{ secrets.BASE_URL }}
        ENV_STAGE: ${{ secrets.ENV_STAGE }}
        AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
      run: |
        # Use the absolute path to the workspace to ensure the file is found
        echo "BASE_URL=${BASE_URL}" > $GITHUB_WORKSPACE/.env
        echo "ENV_STAGE=${ENV_STAGE}" >> $GITHUB_WORKSPACE/.env
        echo "AUTH_TOKEN=${AUTH_TOKEN}" >> $GITHUB_WORKSPACE/.env
          
    - name: Verify inside the container
      run: |
          echo "Running inside the custom container!"
          whoami
          cat /etc/os-release
          node --version || echo "Node not found"
          npm --version || echo "npm not found"

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
